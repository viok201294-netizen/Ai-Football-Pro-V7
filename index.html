    S.tab==='home'    ?renderHome():
    S.tab==='analyze' ?renderAnalyze():
    S.tab==='result'  ?renderResult():
    S.tab==='history' ?renderHistory():
    S.tab==='settings'?renderSettings():
    S.tab==='loading'  ?renderLoading():
  S.tab==='dev'     ?renderDev():'';
  attachEv();
  if(S.importExportMode){
    const ieDiv=document.getElementById('ie-overlay');
    if(!ieDiv){
      const div=document.createElement('div');
      div.id='ie-overlay';
      document.body.appendChild(div);
    }
    document.getElementById('ie-overlay').innerHTML=renderImportExport();
    document.getElementById('ie-overlay').style.display='flex';
  } else {
    const ieDiv=document.getElementById('ie-overlay');
    if(ieDiv) ieDiv.style.display='none';
  }
  renderWelcomeScreen();
}


/* ═══════════════════════════════════════════
   PROFILE — avatar, name, TTS, welcome
═══════════════════════════════════════════ */

function toggleEmojiPicker(){
  S.profile._showEP=!S.profile._showEP;
  render();
}

function onEmojiGridClick(ev){
  const el=ev.target.closest('[data-em]');
  if(!el)return;
  S.profile.emoji=el.dataset.em;
  S.profile.avatarType='emoji';
  S.profile._showEP=true;
  render();
}

function pickProfilePhoto(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      S.profile.avatar=ev.target.result;
      S.profile.avatarType='photo';
      S.profile._showEP=false;
      saveState(); render();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function saveProfile(){
  const inp=document.getElementById('profile-name-inp');
  if(inp) S.profile.name=inp.value.trim();
  S.profile._showEP=false;
  saveState();
  navigator.vibrate&&navigator.vibrate([20,10,20]);
  toastOK('✅ Đã lưu hồ sơ!');
  render();
}

/* ── Storage slot switcher ── */
function switchSlot(n){
  if(S.lsSlot===n)return;
  // Save current state to current slot
  saveState();
  // Switch key
  const KEYS={1:'Ai_analyser_v7.3',2:'Ai_analyser_v7.3_p2',3:'Ai_analyser_v7.3_p3'};
  LS_KEY=KEYS[n]||KEYS[1];
  S.lsSlot=n;
  // Reset state to defaults then load new slot
  S.tk='cyan'; S.brightness='light'; S.tab='home'; S.hist=[];
  S.ar=null; S.cids=[]; S.pin=''; S.form={tA:'',tB:'',lg:'',o1:'',o2:'',ml:2.5,mh:'',hcSide:'home'};
  S.profile={name:'',avatar:'',avatarType:'emoji',emoji:'⚽'};
  S.firstTs=null; S.expLock=false; S.sub='history';
  loadState();
  // Keep slot number
  S.lsSlot=n;
  toastOK('✅ Chuyển sang Hồ sơ '+n);
  render();
}

/* ── TTS welcome ── */
function speakWelcome(name){
  try{
    if(!window.speechSynthesis)return;
    speechSynthesis.cancel();
    const text=name
      ?'Chào mừng bạn đã trở lại, '+name+'! Hôm nay chúc bạn phân tích chuẩn nhé!'
      :'Chào mừng bạn đã trở lại! Hôm nay chúc bạn phân tích chuẩn nhé!';
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='vi-VN';
    utter.rate=0.88;
    utter.pitch=1.25;
    // Try to get a female / Vietnamese voice
    const trySpeak=()=>{
      const voices=speechSynthesis.getVoices();
      const vi=voices.find(v=>v.lang.startsWith('vi')&&/female|woman|girl/i.test(v.name))
             ||voices.find(v=>v.lang.startsWith('vi'))
             ||voices.find(v=>/female|woman/i.test(v.name));
      if(vi) utter.voice=vi;
      speechSynthesis.speak(utter);
    };
    if(speechSynthesis.getVoices().length>0) trySpeak();
    else{ speechSynthesis.onvoiceschanged=trySpeak; }
  }catch(e){}
}

/* ── Welcome screen render ── */
function renderWelcomeScreen(){
  const el=document.getElementById('welcome-overlay');
  if(!el)return;
  if(!S.showWelcome){el.style.display='none';return;}
  const t=T();
  const ac=t.a2||'#00e5ff';
  const ac2=t.ac||'#00b0ff';
  const gr=t.gr||'#00e676';

  // ── Particle dots (random positions) ──
  const particles=['10%,90%,3.5s','85%,80%,2.8s','25%,75%,4.1s','70%,85%,3.2s',
    '15%,30%,2.5s','90%,40%,3.8s','50%,15%,4.5s','5%,55%,2.9s',
    '60%,70%,3.4s','40%,88%,2.6s','75%,20%,4.2s','30%,45%,3.7s'].map(p=>{
    const[x,y,d]=p.split(',');
    const size=Math.floor(Math.random()*4)+2;
    const delay=(Math.random()*2).toFixed(1);
    return '<div style="position:absolute;left:'+x+';top:'+y+';width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+ac+';opacity:0.6;animation:wlcParticle '+d+' '+delay+'s ease-in infinite"></div>';
  }).join('');

  // ── Grid lines bg ──
  const gridLines=
    '<div style="position:absolute;inset:0;background-image:linear-gradient('+ac+'12 1px,transparent 1px),linear-gradient(90deg,'+ac+'12 1px,transparent 1px);background-size:40px 40px;animation:wlcFadeIn 1.5s ease"></div>';

  // ── Scan line effect ──
  const scanLine=
    '<div style="position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,'+ac+'88,transparent);animation:wlcScanLine 3s linear infinite;pointer-events:none"></div>';

  // ── Ring burst ──
  const rings=[1,2,3].map((i)=>
    '<div style="position:absolute;inset:0;margin:auto;width:160px;height:160px;border-radius:50%;border:1.5px solid '+ac+';animation:wlcRingOut '+(1.8+i*0.6)+'s ease-out '+(i*0.4)+'s infinite;pointer-events:none"></div>'
  ).join('');

  // ── Main content ──
  el.style.display='flex';
  el.style.alignItems='center';
  el.style.justifyContent='center';
  el.innerHTML=
    // BG layer
    '<div style="position:absolute;inset:0;background:linear-gradient(160deg,#050a14 0%,#0a1628 40%,#060d1a 100%)"></div>'+
    gridLines+
    // Particles
    '<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">'+particles+'</div>'+
    scanLine+
    // Rings around logo
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">'+rings+'</div>'+

    // ── CONTENT wrapper ──
    '<div style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:0 28px;animation:wlcFadeIn 0.6s ease">'+

      // ── LOGO ──
      '<div style="position:relative;margin-bottom:28px;animation:wlcFloat 3s ease-in-out infinite">'+
        // Outer glow disc
        '<div style="position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,'+ac+'22 0%,transparent 70%)"></div>'+
        // Spinning ring
        '<div style="position:absolute;inset:-6px;border-radius:50%;border:2px solid transparent;border-top-color:'+ac+';border-right-color:'+ac2+';animation:spin 2s linear infinite"></div>'+
        '<div style="position:absolute;inset:-14px;border-radius:50%;border:1.5px solid transparent;border-bottom-color:'+ac+'66;animation:spin 3.5s linear infinite reverse"></div>'+
        // Ball
        '<div style="width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,'+ac+'33,#0d1f3c);border:2px solid '+ac+'55;display:flex;align-items:center;justify-content:center;font-size:56px;animation:ballSpin 8s linear infinite">⚽</div>'+
      '</div>'+

      // ── APP NAME ──
      '<div style="font-family:Orbitron,monospace;font-size:30px;font-weight:900;color:#fff;letter-spacing:4px;text-align:center;line-height:1;animation:wlcGlow 2.5s ease-in-out infinite;margin-bottom:4px">AI FOOTBALL</div>'+
      '<div style="font-family:Orbitron,monospace;font-size:13px;font-weight:700;color:'+ac+';letter-spacing:6px;text-align:center;margin-bottom:6px">ANALYSER</div>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">'+
        '<div style="height:1px;width:40px;background:linear-gradient(90deg,transparent,'+ac+')"></div>'+
        '<div style="font-size:9px;color:'+ac+';letter-spacing:3px;font-weight:700">PRO v7.3</div>'+
        '<div style="height:1px;width:40px;background:linear-gradient(90deg,'+ac+',transparent)"></div>'+
      '</div>'+

      // ── SLOGAN ──
      '<div style="font-size:12px;color:#8899aa;text-align:center;letter-spacing:1.5px;line-height:1.8;margin-bottom:36px;animation:wlcSlideUp 0.8s ease 0.3s both">'+
        'Phân tích kèo thông minh<br>'+
        '<span style="color:'+gr+';font-weight:700">Tài · Xỉu · Chấp</span> — Chính xác mỗi ngày'+
      '</div>'+

      // ── LOADING BAR ──
      '<div id="wlc-bar-wrap" style="width:200px;margin-bottom:28px;animation:wlcSlideUp 0.8s ease 0.5s both">'+
        '<div style="height:3px;border-radius:2px;background:#ffffff14;overflow:hidden;margin-bottom:8px">'+
          '<div id="wlc-bar" style="height:100%;width:0%;background:linear-gradient(90deg,'+ac2+','+ac+');border-radius:2px;animation:wlcBarFill 2.4s cubic-bezier(.4,0,.2,1) 0.3s forwards"></div>'+
        '</div>'+
        '<div id="wlc-bar-text" style="font-size:9px;color:#556677;text-align:center;letter-spacing:2px">ĐANG KHỞI ĐỘNG...</div>'+
      '</div>'+

      // ── START BUTTON (appears after bar fills) ──
      '<div id="wlc-btn-wrap" style="opacity:0;animation:wlcSlideUp 0.6s ease 2.7s both">'+
        '<button onclick="closeWelcome();speakWelcome(S.profile.name)" '+
          'style="padding:16px 52px;background:linear-gradient(135deg,'+ac+','+ac2+');border:none;border-radius:50px;'+
          'color:#000;font-size:15px;font-weight:900;cursor:pointer;font-family:Orbitron,monospace;letter-spacing:2px;'+
          'box-shadow:0 0 30px '+ac+'66,0 8px 24px '+ac+'33;animation:wlcBtnPulse 1.5s ease 2.7s infinite">'+
          '▶ BẮT ĐẦU'+
        '</button>'+
        '<div style="margin-top:14px;font-size:9px;color:#445566;text-align:center;letter-spacing:1.5px">TAP TO CONTINUE</div>'+
      '</div>'+

    '</div>'; // end content

  // Animate bar text
  setTimeout(()=>{
    const bt=document.getElementById('wlc-bar-text');
    if(bt) bt.textContent='SẴN SÀNG ✓';
    bt&&(bt.style.color=ac);
  },2700);
  // Speak welcome with delay
  setTimeout(()=>speakWelcome(S.profile.name||''),800);
}

function closeWelcome(){
  const el=document.getElementById('welcome-overlay');
  if(!el)return;
  // Slide-out animation
  el.style.transition='opacity 0.5s ease, transform 0.5s ease';
  el.style.opacity='0';
  el.style.transform='scale(1.04)';
  setTimeout(()=>{
    S.showWelcome=false;
    el.style.display='none';
    el.style.opacity=''; el.style.transform=''; el.style.transition='';
  },500);
}

/* BOOT */
loadState();
S.showWelcome=true; // Always show splash on open
render();
// Auto-refresh every 60s when mode=auto (catches 6:00/18:00 threshold)
setInterval(()=>{ if((S.brightness||'dark')==='auto') render(); }, 60000);
// Realtime clock + countdown — updates every second without full render
setInterval(()=>{
  // Clock
  const el=document.getElementById('hero-clock');
  if(el){const v=getVNTime();el.children[0].textContent=v.time;el.children[1].textContent=v.date;}
  // Expiry countdown
  const cd=document.getElementById('exp-countdown');
  if(cd&&S.firstTs){
    const THREE_DAYS=3*24*60*60*1000;
    const remaining=Math.max(0,(S.firstTs+THREE_DAYS)-Date.now());
    const d=Math.floor(remaining/86400000);
    const h=Math.floor((remaining%86400000)/3600000);
    const m=Math.floor((remaining%3600000)/60000);
    const s=Math.floor((remaining%60000)/1000);
    cd.textContent=d>0
      ?d+'n '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m'
      :String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    // Trigger expiry check
    if(remaining===0&&!S.expLock){S.expLock=true;render();}
  }
},1000);
// Init clock immediately after first render
setTimeout(()=>{
  const el=document.getElementById('hero-clock');
  if(!el) return;
  const v=getVNTime();
  el.children[0].textContent=v.time;
  el.children[1].textContent=v.date;
},50);
</script>
